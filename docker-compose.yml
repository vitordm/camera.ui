services:
  camera-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: camera-ui:local
    container_name: camera-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "7272:7272"
      - "2727:2727"
      - "5050:5050"
    volumes:
      - camera-ui-data:/data
    environment:
      TZ: America/Sao_Paulo

volumes:
  camera-ui-data:
